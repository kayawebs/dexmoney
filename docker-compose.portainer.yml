name: dexmoney-admin

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: dexmoney-portainer
    restart: unless-stopped
    ports:
      - "${PORTAINER_BIND:-127.0.0.1}:${PORTAINER_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

volumes:
  portainer_data:
