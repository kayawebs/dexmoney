name: dexmoney-apps

x-app-common: &app-common
  restart: unless-stopped
  env_file:
    - .env
    - path: .env.docker
      required: false
  environment:
    POSTGRES_URL: ${POSTGRES_URL_DOCKER:-postgres://user:password@base-arb-postgres:5432/base_arb}
    REDIS_URL: ${REDIS_URL_DOCKER:-redis://base-arb-redis:6379}
    BASE_RPC_HTTP: ${BASE_RPC_HTTP_DOCKER:-http://node-execution-1:8545}
    BASE_RPC_WS: ${BASE_RPC_WS_DOCKER:-ws://node-execution-1:8546}
  networks:
    - dexmoney
    - base-node

services:
  market-data:
    <<: *app-common
    container_name: dexmoney-market-data
    image: dexmoney-market-data:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: market-data
        APP_BIN: market-data

  pool-discovery:
    <<: *app-common
    container_name: dexmoney-pool-discovery
    image: dexmoney-pool-discovery:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: market-data
        APP_BIN: pool-discovery

  v4-metadata-hydrator:
    <<: *app-common
    container_name: dexmoney-v4-metadata-hydrator
    image: dexmoney-v4-metadata-hydrator:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: base-arb-recorder
        APP_BIN: hydrate_uniswap_v4_observations
    command:
      - app
      - --loop
      - --apply
      - --limit
      - "${V4_METADATA_HYDRATOR_LIMIT:-100}"
      - --lookback-blocks
      - "${V4_METADATA_HYDRATOR_LOOKBACK_BLOCKS:-500000}"
      - --max-observation-age-blocks
      - "${V4_METADATA_HYDRATOR_MAX_OBSERVATION_AGE_BLOCKS:-5000}"
      - --chunk-blocks
      - "${V4_METADATA_HYDRATOR_CHUNK_BLOCKS:-1000}"
      - --interval-ms
      - "${V4_METADATA_HYDRATOR_INTERVAL_MS:-30000}"

  v3-tick-repair:
    <<: *app-common
    container_name: dexmoney-v3-tick-repair
    image: dexmoney-v3-tick-repair:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: base-arb-recorder
        APP_BIN: repair_v3_ticks
    command:
      - app
      - --loop
      - --apply
      - --gaps-only
      - --limit
      - "${V3_TICK_REPAIR_LIMIT:-100}"
      - --max-age-hours
      - "${V3_TICK_REPAIR_MAX_AGE_HOURS:-2}"
      - --word-radius
      - "${V3_TICK_REPAIR_WORD_RADIUS:-64}"
      - --interval-secs
      - "${V3_TICK_REPAIR_INTERVAL_SECS:-30}"

  v4-tick-repair:
    <<: *app-common
    container_name: dexmoney-v4-tick-repair
    image: dexmoney-v4-tick-repair:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: base-arb-recorder
        APP_BIN: hydrate_uniswap_v4_ticks
    command:
      - app
      - --loop
      - --manager-scan
      - --apply
      - --refresh-existing
      - --limit
      - "${V4_TICK_REPAIR_LIMIT:-1000}"
      - --max-lookback-blocks
      - "${V4_TICK_REPAIR_INITIAL_LOOKBACK_BLOCKS:-5000}"
      - --chunk-blocks
      - "${V4_TICK_REPAIR_CHUNK_BLOCKS:-1000}"
      - --flush-pool-batch-size
      - "${V4_TICK_REPAIR_FLUSH_POOL_BATCH_SIZE:-256}"
      - --loop-overlap-blocks
      - "${V4_TICK_REPAIR_LOOP_OVERLAP_BLOCKS:-20}"
      - --interval-ms
      - "${V4_TICK_REPAIR_INTERVAL_MS:-30000}"

  searcher:
    <<: *app-common
    container_name: dexmoney-searcher
    image: dexmoney-searcher:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: searcher
        APP_BIN: searcher

  monitor-web:
    <<: *app-common
    container_name: dexmoney-monitor-web
    image: dexmoney-monitor-web:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: monitor-web
        APP_BIN: monitor-web
    ports:
      - "${MONITOR_WEB_BIND:-127.0.0.1}:${MONITOR_WEB_PORT:-8085}:8085"

  health-monitor:
    <<: *app-common
    container_name: dexmoney-health-monitor
    image: dexmoney-health-monitor:${DEXMONEY_IMAGE_TAG:-latest}
    build:
      context: .
      args:
        APP_PACKAGE: health-monitor
        APP_BIN: health-monitor

  execution-manager:
    <<: *app-common
    container_name: dexmoney-execution-manager
    image: dexmoney-execution-manager:${DEXMONEY_IMAGE_TAG:-latest}
    profiles:
      - executor
    build:
      context: .
      args:
        APP_PACKAGE: execution-manager
        APP_BIN: execution-manager

networks:
  dexmoney:
    name: ${DEXMONEY_DOCKER_NETWORK:-dexmoney_default}
    external: true
  base-node:
    name: ${BASE_NODE_DOCKER_NETWORK:-node_default}
    external: true
