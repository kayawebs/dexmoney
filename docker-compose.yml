services:
  postgres:
    image: postgres:16
    container_name: base-arb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: base_arb
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5632:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/0001_init.sql:/docker-entrypoint-initdb.d/0001_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d base_arb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: base-arb-redis
    restart: unless-stopped
    ports:
      - "6779:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:

